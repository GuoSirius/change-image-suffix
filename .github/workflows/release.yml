name: Publish to NPM and GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes from CHANGELOG
        id: generate_notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Extracting release notes for v$VERSION"
          
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              BEGIN { in_section=0; target_level=0 }
              /^[#]+ \[[^]]+\]/ {
                # Count leading # characters
                match($0, /^[#]+/)
                level = RLENGTH
                
                if (in_section) {
                  # If we find a version line with same or fewer #s, stop
                  if (level <= target_level) exit
                  next
                }
                
                if ($0 ~ "\\[v?" ver "\\]") {
                  in_section = 1
                  target_level = level
                  next
                }
              }
              in_section {
                print $0
              }
            ' CHANGELOG.md > release_notes.txt
            
            if [ -s release_notes.txt ]; then
              echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
              cat release_notes.txt >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            else
              echo "RELEASE_NOTES=See [CHANGELOG.md](https://github.com/GuoSirius/change-image-suffix/blob/main/CHANGELOG.md) for detailed changes." >> $GITHUB_OUTPUT
            fi
          else
            echo "RELEASE_NOTES=See [CHANGELOG.md](https://github.com/GuoSirius/change-image-suffix/blob/main/CHANGELOG.md) for detailed changes." >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## What's Changed in v${{ steps.get_version.outputs.VERSION }}

            ${{ steps.generate_notes.outputs.RELEASE_NOTES }}

            ---

            ### Installation

            ```bash
            npm install -g change-image-suffix@${{ steps.get_version.outputs.VERSION }}
            ```

            ### Changelog

            See the full [CHANGELOG.md](https://github.com/GuoSirius/change-image-suffix/blob/main/CHANGELOG.md) for all changes.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        run: rm -f release_notes.txt
