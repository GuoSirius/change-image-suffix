name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Get release version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true
          body: |
            ---
            
            ## Installation
            
            ```bash
            npm install -g change-image-suffix@${{ steps.get_version.outputs.VERSION }}
            ```
            
            ---
            
            ## Changelog
            
            See the full [CHANGELOG.md](https://github.com/GuoSirius/change-image-suffix/blob/main/CHANGELOG.md) for all changes.
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
